# Provider capability matrix — router's declarative knowledge base.
#
# The router reads this file to decide which provider renders which shot.
# This is the "core IP" — it encodes domain knowledge without coupling it to code.
#
# Edit cadence: weekly during normal ops, per-shot during a run.
# Every change should be accompanied by a test in tests/router/.

schema_version: "1.2"

# Role-based tiers. See CLAUDE.md § Provider priority.
#
# workhorse  — handle the bulk of shots; cheap, reliable, predictable.
# specialty  — reserved for hero shots (establishing, cinematic); high quality,
#              metered by hard spend cap.
# deferred   — not integrated this week.
tiers:
  workhorse:
    - alibaba_wan_2_7_plus       # final/approved renders, non-hero, non-human
    - alibaba_wan_2_7_turbo      # iteration + rejected-shot retries (cheap, fast loop)
    - fal_kling_2_1_standard     # human shots, baseline fidelity (cheaper)
    - fal_kling_2_1_pro          # human shots with refs, first/last frame, or higher fidelity needs
    - elevenlabs                 # all audio
  specialty:
    - vertex_veo_3_1_fast     # hero/establishing shots; $15 hard cap; NO humans
  # Day-4 consideration: reference-image providers for Kling I2V subject consistency.
  # Not integrated in v1 — reference images, if any, come from inputs/refs/ manually.
  day_4_candidates:
    - qwen_image_2_0
    - google_nano_banana
  deferred:
    - fal_runway_gen4
    - vertex_imagen_4
    - fal_ltx
    - fal_seedance
    - alibaba_wan_2_1_vace_plus   # video-edit/inpainting, not generation — wrong use case

providers:

  alibaba_wan_2_7_plus:
    display_name: "Alibaba Wan 2.7 (text-to-video)"
    modality: video
    access: alibaba_cloud          # DashScope API (Alibaba Cloud Model Studio)
    # Canonical DashScope model id per the Wan text-to-video API reference:
    # https://www.alibabacloud.com/help/en/model-studio/text-to-video-api-reference
    # Wan 2.7 uses the NEW protocol (resolution + ratio parameters, NOT size).
    model_id: "wan2.7-t2v"
    tier: workhorse
    role: "final/approved renders for non-hero, non-human shots (higher-fidelity Wan 2.7)"
    cost_per_second_usd: 0.0       # free quota — track budget.alibaba_quota_remaining instead
    quota_metered: true
    max_duration_s: 10             # Wan 2.7 supports up to 10s per task
    supported_resolutions: ["720p", "1080p"]
    modes:                         # Wan supports multiple generation modes
      t2v: true                    # default — text → video
      i2v: true                    # used when shot.prompt.start_frame_path is set
      r2v: false                   # reference-to-video; not in v1 loop
      s2v: false                   # speech-to-video (digital human); not in v1 loop
    supports_first_last_frame: false  # Wan I2V is single-image conditioning only
    max_reference_images: 1
    capabilities:
      # TODO(day-2): verify capability scores against actual test renders.
      # 1.0 = strong, 0.5 = workable, 0.0 = avoid.
      non_human_scenes: 0.90
      human_scenes: 0.55           # not primary path; route humans to Kling
      high_motion: 0.70
      low_motion: 0.92
      stylized: 0.85
      photoreal: 0.85
      negative_prompt_support: true
      image_conditioning: true     # via I2V mode
      audio_generation: false
    prompt_grammar: wan_descriptive
    known_failures: []

  alibaba_wan_2_7_turbo:
    display_name: "Alibaba Wan 2.6 (text-to-video)"
    modality: video
    access: alibaba_cloud
    # Canonical DashScope model id. Wan 2.6 uses the LEGACY protocol (size parameter).
    # Kept in the 'turbo' slot as the iteration-tier Wan workhorse: earlier model =>
    # cheaper on the free quota / faster turnaround / acceptable fidelity for rejected-shot
    # retries. Promote to wan2.7-t2v (above) for finals.
    model_id: "wan2.6-t2v"
    tier: workhorse
    role: "iteration loop + rejected-shot retries (earlier Wan model; cheaper/faster on quota)"
    cost_per_second_usd: 0.0       # free quota
    quota_metered: true
    max_duration_s: 10             # Wan 2.6 accepts duration in {5, 10}
    supported_resolutions: ["720p", "1080p"]
    modes:
      t2v: true
      i2v: true
      r2v: false
      s2v: false
    supports_first_last_frame: false
    max_reference_images: 1
    capabilities:
      non_human_scenes: 0.75       # lower quality than plus; fine for iteration
      human_scenes: 0.45
      high_motion: 0.60
      low_motion: 0.80
      stylized: 0.75
      photoreal: 0.70
      negative_prompt_support: true
      image_conditioning: true
      audio_generation: false
    prompt_grammar: wan_descriptive
    known_failures:
      - "sacrifices fine detail for speed — not for final renders"

  fal_kling_2_1_standard:
    display_name: "Kling 2.1 Standard (via fal.ai)"
    modality: video
    access: fal_ai
    model_id: "fal-ai/kling-video/v2.1/standard/image-to-video"
    tier: workhorse
    role: "human shots — baseline fidelity, cheaper. Default for human shots without refs or end-frame constraints."
    # Kling 2.1 Standard pricing (fal.ai, as of Apr 2026 research):
    #   $0.25 base for 5s + $0.05 per additional second.
    # Renderer should calculate: base_cost_5s + max(0, duration_s - 5) * cost_per_second_usd
    cost_per_second_usd: 0.05
    base_cost_5s: 0.25
    max_duration_s: 10
    supported_resolutions: ["720p", "1080p"]
    modes:
      t2v: false                      # fal Kling endpoints are I2V-only
      i2v: true                       # start-frame required
    # Feature flags consumed by the router (see hard_rules below).
    supports_first_last_frame: true   # Kling accepts tail_image_url on both tiers
    max_reference_images: 4           # input_image_urls supports up to 4 subject refs
    capabilities:
      non_human_scenes: 0.75
      human_scenes: 0.85              # strong; marginally behind Pro
      high_motion: 0.65               # Pro handles high motion better
      low_motion: 0.85
      stylized: 0.80
      photoreal: 0.75
      negative_prompt_support: true
      image_conditioning: true
      audio_generation: false
    prompt_grammar: kling_style_tags
    known_failures:
      - "struggles with fast camera moves — escalate to Pro"
      - "subject consistency with multiple refs is softer than Pro"

  fal_kling_2_1_pro:
    display_name: "Kling 2.1 Pro (via fal.ai)"
    modality: video
    access: fal_ai
    model_id: "fal-ai/kling-video/v2.1/pro/image-to-video"
    tier: workhorse
    role: "human shots requiring subject consistency, first+last frame interpolation, or higher motion fidelity"
    # Kling 2.1 Pro pricing (fal.ai model page, verified 2026-04-23):
    #   $0.49 base for 5s + $0.098 per additional second.
    cost_per_second_usd: 0.098
    base_cost_5s: 0.49
    max_duration_s: 10
    supported_resolutions: ["720p", "1080p"]
    modes:
      t2v: false
      i2v: true
    supports_first_last_frame: true
    max_reference_images: 4
    capabilities:
      non_human_scenes: 0.85
      human_scenes: 0.92              # strongest human handling in v1 set
      high_motion: 0.78
      low_motion: 0.88
      stylized: 0.88
      photoreal: 0.85
      negative_prompt_support: true
      image_conditioning: true
      audio_generation: false
    prompt_grammar: kling_style_tags
    known_failures:
      - "still imperfect on very fast camera moves — budget extra attempts"

  vertex_veo_3_1_fast:
    display_name: "Google Veo 3.1 Fast"
    modality: video
    access: vertex_ai
    # Canonical Vertex AI model id — GA since 2025-11-17 (verified 2026-04-23).
    # The preview id veo-3.1-fast-generate-preview was discontinued 2026-04-02.
    model_id: "veo-3.1-fast-generate-001"
    tier: specialty
    role: "hero/establishing shots only — 3–5 shots per film"
    # Veo 3.1 Fast: $0.15/s with audio. Disable generateAudio to drop to $0.10/s
    # (ElevenLabs owns audio in our pipeline, so we always request audio off).
    cost_per_second_usd: 0.10
    max_duration_s: 8
    # Veo 3.x accepts only these discrete durations. The adapter must snap.
    valid_durations_s: [4, 6, 8]
    supported_resolutions: ["720p", "1080p"]
    # Hard spend cap for this provider — the router MUST enforce.
    spend_cap_usd: 15.0
    supports_first_last_frame: false   # Veo is T2V / single-image I2V; no tail frame
    max_reference_images: 1
    capabilities:
      non_human_scenes: 0.95
      human_scenes: 0.0            # FORBIDDEN — EU restriction + router hard rule
      high_motion: 0.80
      low_motion: 0.95
      stylized: 0.75
      photoreal: 0.95
      # Veo 3.1 (and 3.1 Fast) DOES support negativePrompt — corrected vs older
      # docs. We still keep descriptions self-contained; negatives are additive.
      negative_prompt_support: true
      image_conditioning: true
      audio_generation: true            # disable; ElevenLabs owns audio
    prompt_grammar: veo_natural_language
    known_failures:
      - "refuses most human-subject prompts; EU restriction — never route humans here"
      - "policy rejects come back on the completed operation (raiMediaFilteredCount > 0) AND ARE STILL BILLED"
      - "clips wide horizons; specify 'full frame' explicitly"

  elevenlabs:
    display_name: "ElevenLabs"
    modality: audio
    access: elevenlabs_api
    tier: workhorse
    role: "all audio — dialogue, SFX, (music stubbed)"
    cost_per_second_usd: 0.0        # pre-paid credits; see quota_metered
    quota_metered: true             # tracked via budget.elevenlabs_credits_remaining
    # Credit cost varies by model. Audio Agent must estimate before each call:
    #   eleven_multilingual_v2:  ~1 credit / character  (quality — finals)
    #   eleven_turbo_v2_5:       ~0.5 credits / char    (iteration — cheaper)
    #   sfx (sound effects):     ~50 credits / second
    default_models:
      dialogue_finals: "eleven_multilingual_v2"
      dialogue_iteration: "eleven_turbo_v2_5"
      sfx: "eleven_sound_effects"
    capabilities:
      dialogue: 0.95
      sfx: 0.75
      music: 0.40                   # usable but not competitive with Suno/Udio
      voice_cloning: 0.90
      multilingual: 0.85
    known_failures: []

# Router decision weights. Sum need not equal 1.
decision_weights:
  capability_match: 0.50
  cost: 0.20
  prior_failures: 0.20
  tier_preference: 0.10

# Hard rules — violation of these short-circuits ranking. Router MUST enforce.
hard_rules:
  - id: "humans_never_veo"
    description: "Veo refuses humans (EU restriction). Never route human shots to Veo."
    predicate: "shot.has_humans == true AND provider == 'vertex_veo_3_1_fast' → EXCLUDE"

  - id: "veo_spend_cap"
    description: "Veo is specialty-tier; $15 hard cap across the whole project."
    predicate: "provider == 'vertex_veo_3_1_fast' AND budget.by_provider['vertex_veo_3_1_fast'] >= 15.0 → EXCLUDE"

  - id: "alibaba_quota_exhausted"
    description: "Wan providers are free-quota metered, not USD. Exclude when exhausted."
    predicate: "provider.access == 'alibaba_cloud' AND budget.alibaba_quota_remaining <= 0 → EXCLUDE"

  - id: "elevenlabs_credits_exhausted"
    description: "ElevenLabs is credit-metered. Exclude when remaining credits < estimated cost of the call."
    predicate: "provider == 'elevenlabs' AND budget.elevenlabs_credits_remaining < estimated_credit_cost → EXCLUDE"

  - id: "wan_turbo_for_iteration_only"
    description: "Reserve Wan Turbo for iteration; prefer Plus for first attempts and finals."
    predicate: "provider == 'alibaba_wan_2_7_turbo' AND shot.attempts.length == 0 AND shot.is_hero == false → DEPRIORITIZE"

  - id: "duration_bound"
    description: "Exclude providers that can't render the requested shot duration."
    predicate: "shot.duration_s > provider.max_duration_s → EXCLUDE"

  - id: "prior_failure_penalty"
    description: "Deprioritize providers that failed on this shot already."
    predicate: "provider in [a.provider for a in shot.attempts if a.outcome == 'failed'] → score *= 0.5"

  - id: "global_budget_cap"
    description: "Never exceed the project-wide budget cap."
    predicate: "budget.spent_usd + estimated_cost > budget.cap_usd → EXCLUDE"

  - id: "specialty_reserved_for_heroes"
    description: "Specialty-tier providers are for hero shots only (flagged by Screenwriter)."
    predicate: "provider.tier == 'specialty' AND shot.is_hero != true → DEPRIORITIZE heavily"

  - id: "end_frame_requires_capable_provider"
    description: "A shot with shot.prompt.end_frame_path MUST go to a provider that supports first+last frame interpolation (Kling Standard or Pro via tail_image_url)."
    predicate: "shot.prompt.end_frame_path != null AND provider.supports_first_last_frame != true → EXCLUDE"

  - id: "subject_refs_fit_capacity"
    description: "A shot whose reference_subject_paths exceed the provider's max_reference_images cannot be routed there."
    predicate: "len(shot.prompt.reference_subject_paths or []) > provider.max_reference_images → EXCLUDE"

  - id: "prefer_kling_pro_when_refs_or_end_frame"
    description: "When a shot has multiple subject refs OR an end-frame, Kling Pro's stronger consistency justifies the price delta over Standard."
    predicate: "(len(shot.prompt.reference_subject_paths or []) > 1 OR shot.prompt.end_frame_path != null) AND provider == 'fal_kling_2_1_standard' → DEPRIORITIZE"
