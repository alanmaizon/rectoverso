<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recto Verso Productions — Film Report</title>
<link rel="stylesheet" href="./styles/tokens.css">
<link rel="stylesheet" href="./styles/page.css">
</head>
<body>
<div id="root"></div>
<!-- Runtime data is loaded from ./data/manifest.json and ./data/events.json -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="env,react">
/* global React */
const { useMemo, useState, useEffect } = React;

function asArray(value) {
  return Array.isArray(value) ? value : [];
}

function deriveFilmTitle(manifest) {
  return manifest?.brief?.title || manifest?.project_id || "Untitled Film";
}

function deriveLogline(manifest) {
  return manifest?.brief?.logline || manifest?.script?.summary || manifest?.brief?.artistic_style || "No logline provided yet.";
}

function deriveReleaseDate(manifest, events) {
  const dates = [manifest?.created_at, manifest?.updated_at, ...asArray(events).map((e) => e.ts)].filter(Boolean);
  if (dates.length === 0) return "not finalized";
  const latest = dates.sort().slice(-1)[0];
  const d = new Date(latest);
  if (Number.isNaN(d.getTime())) return "not finalized";
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function inferSceneLabel(shot, index) {
  if (shot.scene !== undefined && shot.scene !== null) return `scene ${shot.scene}`;
  return `scene ${index + 1}`;
}

function normalizeEvent(raw, idx) {
  const id = raw.id ?? raw.event_id ?? idx + 1;
  const eventType = raw.event_type || raw.kind || "event";
  return {
    id,
    ts: raw.ts || "",
    run_id: raw.run_id || null,
    agent: raw.agent || "system",
    provider: raw.provider || null,
    model: raw.model || null,
    event_type: eventType,
    shot_id: raw.shot_id || null,
    attempt_id: raw.attempt_id || null,
    cost_usd: Number(raw.cost_usd || 0),
    latency_s: Number(raw.latency_s || 0),
    input_tokens: Number(raw.input_tokens || 0),
    output_tokens: Number(raw.output_tokens || 0),
    cache_read_tokens: Number(raw.cache_read_tokens || 0),
    cache_creation_tokens: Number(raw.cache_creation_tokens || 0),
    status: raw.status || "ok",
    error: raw.error || null,
    payload: raw.payload || null,
  };
}

function firstExistingPath(paths, fallback) {
  const candidate = asArray(paths).find(Boolean);
  return candidate || fallback;
}

/* --- Masthead -------------------------------------------------------- */
function Masthead() {
  return (
    <header className="mast">
      <div className="mast__inner">
        <div className="mast__wm">RV</div>
        <div className="mast__name">Recto Verso Productions</div>
        <div className="mast__prov">
          <span>Built with Opus 4.7</span>
          <a href="https://github.com/alanmaizon/rectoverso" target="_blank" rel="noopener"
             className="mast__gh" aria-label="Source on GitHub">
            <Icon name="github" size={16} />
          </a>
        </div>
      </div>
    </header>
  );
}

/* --- Icon ------------------------------------------------------------ */
function Icon({ name, size = 16 }) {
  const paths = {
    play: <polygon points="6 3 20 12 6 21 6 3" />,
    pause: <g><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></g>,
    download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></g>,
    external: <g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></g>,
    expand: <polyline points="6 9 12 15 18 9" />,
    collapse: <polyline points="18 15 12 9 6 15" />,
    github: <g fill="currentColor" stroke="none"><path d="M12 .5C5.73.5.75 5.48.75 11.75c0 4.99 3.23 9.22 7.71 10.72.56.1.77-.25.77-.54v-2.1c-3.14.68-3.8-1.33-3.8-1.33-.51-1.3-1.25-1.64-1.25-1.64-1.02-.7.08-.68.08-.68 1.13.08 1.72 1.16 1.72 1.16 1 1.72 2.63 1.22 3.28.94.1-.73.39-1.23.71-1.51-2.5-.28-5.14-1.25-5.14-5.56 0-1.23.44-2.23 1.16-3.02-.12-.28-.5-1.43.11-2.98 0 0 .94-.3 3.08 1.15.89-.25 1.85-.37 2.8-.38.95 0 1.91.13 2.8.38 2.14-1.45 3.08-1.15 3.08-1.15.61 1.55.23 2.7.11 2.98.72.79 1.15 1.79 1.15 3.02 0 4.32-2.64 5.28-5.16 5.55.4.35.76 1.04.76 2.1v3.11c0 .3.2.65.78.54 4.48-1.5 7.7-5.73 7.7-10.72C23.25 5.48 18.27.5 12 .5z"/></g>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
         stroke="currentColor" fill={name === "play" ? "currentColor" : "none"}
         strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
}

/* --- Hero ------------------------------------------------------------ */
function Hero({ manifest, events }) {
  const brief = manifest.brief || {};
  const edit = manifest.edit || {};
  const mins = Math.floor((edit.total_duration_s || brief.target_duration_s || 0) / 60);
  const secs = ((edit.total_duration_s || brief.target_duration_s || 0) % 60).toString().padStart(2, "0");
  const [videoFailed, setVideoFailed] = useState(false);
  const heroPoster = firstExistingPath(["./media/sh_005_v1.png", "./media/sh_001_v1.png"], "./media/sh_001_v1.png");
  const renderFilename = edit.render_path ? edit.render_path.split('/').pop() : null;
  const initialFilmSrc = renderFilename ? `./media/${renderFilename}` : "./media/demo.mp4";
  const [filmSrc, setFilmSrc] = useState(initialFilmSrc);

  const handleVideoError = () => {
    if (filmSrc !== "./media/demo.mp4") {
      setFilmSrc("./media/demo.mp4");
    } else {
      setVideoFailed(true);
    }
  };
  const filmTitle = deriveFilmTitle(manifest);
  const logline = deriveLogline(manifest);
  const released = deriveReleaseDate(manifest, events);

  return (
    <section className="hero">
      <div>
        <div className="hero__frame" aria-label="Hero animation preview">
          {!videoFailed ? (
            <video
              key={filmSrc}
              className="hero__video"
              src={filmSrc}
              poster={heroPoster}
              autoPlay
              muted
              loop
              playsInline
              controls
              preload="auto"
              onError={handleVideoError}
            />
          ) : (
            <img src={heroPoster} alt="Final film poster" />
          )}
        </div>
        <h1 className="hero__title">{filmTitle}</h1>
        <p className="hero__logline">{logline}</p>
      </div>
      <aside className="hero__rail">
        <dl>
          <dt>duration</dt><dd>{mins}:{secs}</dd>
          <dt>aspect</dt><dd>16:9 · 1080p</dd>
          <dt>released</dt><dd>{released}</dd>
          <dt>director</dt><dd>rectoverso (pipeline)</dd>
          <dt>project</dt><dd>{manifest.project_id || "unknown"}</dd>
          {edit.renderer_version && (<><dt>renderer</dt><dd>hyperframes {edit.renderer_version}</dd></>)}
        </dl>
        {edit.render_md5 && (
          <div className="hero__signature">
            <span className="hero__signature-label">render signature</span>
            <code className="hero__signature-md5">md5 {edit.render_md5}</code>
            <span className="hero__signature-note">bit-identical on every render</span>
          </div>
        )}
        {edit.composition_archive_path && (
          <a href={`./${edit.composition_archive_path}`} className="hero__dl-download" download>
            <Icon name="download" /> Download composition
          </a>
        )}
      </aside>
    </section>
  );
}

/* --- Brief ----------------------------------------------------------- */
function Brief({ brief }) {
  const toneText = asArray(brief.tone).length > 0 ? asArray(brief.tone).join(" · ") : "not specified";
  const genreText = brief.genre || "not specified";
  const lead = brief.logline || brief.artistic_style || "";
  const showStyle = brief.artistic_style && brief.artistic_style !== lead;
  return (
    <section className="section brief" id="brief">
      <p className="section__eyebrow">§ 01 — the brief</p>
      <h2 className="section__title">The creative input.</h2>
      <div className="brief__body">
        <p>{lead}</p>
        {showStyle && (
          <p style={{color:"var(--fg-2)"}}>{brief.artistic_style}</p>
        )}
      </div>
      <div className="brief__tone">
        tone · {toneText} &nbsp;/&nbsp; genre · {genreText}
      </div>
    </section>
  );
}

/* --- Pipeline animation ---------------------------------------------- */
function Pipeline() {
  return (
    <section className="section" id="pipeline">
      <div className="pipeline__frame">
        <video
          className="pipeline__video"
          src="./media/pipeline.mp4"
          autoPlay
          muted
          loop
          playsInline
          preload="metadata"
        />
      </div>
    </section>
  );
}

/* --- Script ---------------------------------------------------------- */
function Script({ shots }) {
  return (
    <section className="section" id="script">
      <p className="section__eyebrow">§ 02 — the script</p>
      <h2 className="section__title">Shots, in order.</h2>
      <ol className="script__list">
        {shots.map((s, i) => (
          <li key={s.shot_id} className="script__row">
            <span className="script__num">{String(i + 1).padStart(2, "0")}</span>
            <span className="script__scene">{inferSceneLabel(s, i)}</span>
            <span className="script__desc">{s.description}</span>
            <span className="script__dur">8.0s</span>
          </li>
        ))}
      </ol>
    </section>
  );
}

/* --- Shot strip + drawer -------------------------------------------- */
function statusDotColor(status) {
  return {
    approved: "#4A6B3A",
    rejected: "#8A3A2A",
    escalated: "#9A6A24",
    created: "#6A6354",
    prompted: "#6A6354",
    routed: "#6A6354",
    rendering: "#6A6354",
    judging: "#6A6354",
  }[status] || "#6A6354";
}

function ribbonRefSrc(shot) {
  const prompt = shot.prompt || {};
  const candidates = [
    prompt.start_frame_path,
    ...(prompt.reference_subject_paths || []),
    ...(prompt.reference_image_paths || []),
  ].filter(Boolean);
  const shotFallback = `./media/${shot.shot_id}_v1.png`;
  if (candidates.length === 0) {
    return shotFallback;
  }
  const selected = String(candidates[0]);
  if (selected.startsWith("inputs/refs/")) {
    return shotFallback;
  }
  if (selected.startsWith("inputs/")) {
    return `../${selected}`;
  }
  return `./${selected}`;
}

function ShotStrip({ shots, activeId, onSelect }) {
  return (
    <section className="section" id="strip">
      <p className="section__eyebrow">§ 03 — the shot strip</p>
      <h2 className="section__title">Evidence.</h2>
      <p style={{maxWidth:"54ch", color:"var(--fg-2)", marginBottom:"var(--sp-5)"}}>
        Click a frame to play the shot inline and open the drawer — the prompt the Prompt Smith authored,
        the provider the Router chose, every attempt, judge notes, cost, and the audio parts that sit
        under this frame. Colour lives here, inside the frames.
      </p>
      <div className="strip" role="listbox">
        {shots.map(s => {
          const fallbackPoster = `./media/${s.shot_id}_v1.png`;
          const ribbonSrc = ribbonRefSrc(s);
          return (
          <button
            key={s.shot_id}
            role="option"
            aria-selected={s.shot_id === activeId}
            aria-label={`Shot ${s.shot_id}${s.shot_id === activeId ? " (playing)" : ""}`}
            className={`strip__card${s.shot_id === activeId ? " strip__card--active" : ""}`}
            onClick={() => onSelect(s.shot_id)}>
            <div className="strip__thumb">
              {s.shot_id === activeId ? (
                <video
                  className="strip__video"
                  src={`./media/${s.shot_id}.mp4`}
                  poster={ribbonSrc || fallbackPoster}
                  autoPlay muted loop playsInline preload="metadata"
                />
              ) : (
                <img
                  src={ribbonSrc}
                  alt=""
                  onError={(ev) => { ev.currentTarget.src = fallbackPoster; }}
                />
              )}
              {s.shot_id === activeId && <span className="strip__playing">playing</span>}
            </div>
            <div className="strip__meta">
              <span>{s.shot_id}</span>
              <span>8.0s</span>
            </div>
            <div className="strip__title">{s.description}</div>
          </button>
        )})}
      </div>
    </section>
  );
}

function ShotDrawer({ shot, audio }) {
  if (!shot) return null;
  const chosen = shot.routing || {};
  const final = shot.final;
  const dialogue = asArray(audio && audio.dialogue).filter(d => d.shot_id === shot.shot_id || d?.timing?.shot_id === shot.shot_id);
  const sfx = asArray(audio && audio.sfx).filter(s => s.shot_id === shot.shot_id || s?.timing?.shot_id === shot.shot_id);
  return (
    <div className="section" style={{paddingTop:0}}>
      <div className="drawer" key={shot.shot_id}>
        <div>
          <p className="drawer__eyebrow">shot {shot.shot_id.replace("sh_","")} · {typeof shot.scene === "number" ? `scene ${shot.scene} · ` : ""}8.0s</p>
          <h3 className="drawer__title">{shot.description}</h3>
          <blockquote className="drawer__prompt">"{shot?.prompt?.primary || "Prompt not recorded."}"</blockquote>
          {shot.artistic_direction && (
            <p className="drawer__dir"><em>Direction.</em> {shot.artistic_direction}</p>
          )}

          <dl className="drawer__kv">
            <dt>provider</dt><dd>{chosen.chosen_provider || "unknown"}</dd>
            <dt>model</dt><dd>{chosen.chosen_model || "unknown"}</dd>
            <dt>rationale</dt><dd style={{fontFamily:"var(--f-serif)",fontSize:13,color:"var(--fg-2)",lineHeight:1.4}}>{chosen.rationale || chosen.reasoning || "No router rationale recorded."}</dd>
            <dt>alternates</dt><dd>{(chosen.alternates||[]).join(", ") || "—"}</dd>
          </dl>
        </div>

        <div>
          <p className="drawer__eyebrow">attempts · {asArray(shot.attempts).length}</p>
          <div className="drawer__attempts">
            {asArray(shot.attempts).map(a => (
              <div key={a.attempt_id} className="attempt">
                <span className="attempt__num">#{a.attempt_id}</span>
                <div className="attempt__body">
                  <span className="dot" style={{background: statusDotColor(a.outcome)}} />
                  <strong style={{fontWeight:600}}>{a.outcome}</strong>
                  <em> — {a.judge_notes}</em>
                </div>
                <span className="attempt__cost">${a.cost_usd.toFixed(2)} · {a.latency_s}s</span>
              </div>
            ))}
            {asArray(shot.attempts).length === 0 && (
              <div className="attempt">
                <span className="attempt__num">#—</span>
                <div className="attempt__body">No attempts recorded yet.</div>
                <span className="attempt__cost">—</span>
              </div>
            )}
          </div>

          {final && (
            <dl className="drawer__kv" style={{marginTop:"var(--sp-3)"}}>
              <dt>final</dt><dd>{(final.render_path || "").split("/").pop() || "unknown"}{final.attempt_id ? ` · attempt #${final.attempt_id}` : ""}</dd>
              <dt>status</dt><dd>
                <span className="dot" style={{background: statusDotColor(shot.status)}} />
                {shot.status}
              </dd>
            </dl>
          )}
          {!final && (
            <dl className="drawer__kv" style={{marginTop:"var(--sp-3)"}}>
              <dt>status</dt><dd>
                <span className="dot" style={{background: statusDotColor(shot.status)}} />
                {shot.status} — editor will crop wider in post
              </dd>
            </dl>
          )}

          {(dialogue.length > 0 || sfx.length > 0) && (
            <div className="drawer__parts">
              <p className="drawer__eyebrow" style={{marginTop:"var(--sp-4)"}}>audio parts · {dialogue.length + sfx.length}</p>
              {dialogue.map(d => (
                <figure key={d.line_id} className="part part--dialogue">
                  <figcaption className="part__caption">
                    <span className="part__kind">dialogue</span>
                    <span className="part__id">{d.line_id || d.voice_id || "line"}</span>
                    <span className="part__timing">
                      {typeof d?.timing?.in_s === "number" && typeof d?.timing?.out_s === "number"
                        ? `${d.timing.in_s.toFixed(1)}s -> ${d.timing.out_s.toFixed(1)}s`
                        : typeof d?.timing?.offset_s === "number"
                          ? `offset ${d.timing.offset_s.toFixed(1)}s`
                          : "timing n/a"}
                    </span>
                  </figcaption>
                  <blockquote className="part__text">"{d.text}"</blockquote>
                  <audio className="part__audio" controls preload="metadata" src={`./${d.audio_path}`} />
                </figure>
              ))}
              {sfx.map(s => (
                <figure key={s.sfx_id} className="part part--sfx">
                  <figcaption className="part__caption">
                    <span className="part__kind">sfx</span>
                    <span className="part__id">{s.sfx_id}</span>
                  </figcaption>
                  <p className="part__text">{s.description}</p>
                  <audio className="part__audio" controls preload="metadata" src={`./${s.audio_path}`} />
                </figure>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* --- Trace ----------------------------------------------------------- */
function AgentTrace({ events, shots }) {
  const [filter, setFilter] = useState("all");
  const filters = useMemo(() => {
    const agents = Array.from(new Set(events.map(e => e.agent)));
    return ["all", ...agents];
  }, [events]);

  const visible = events.filter(e => filter === "all" || e.agent === filter);
  const PAGE = 15;
  const [page, setPage] = useState(1);
  useEffect(() => { setPage(1); }, [filter]);
  const totalPages = Math.max(1, Math.ceil(visible.length / PAGE));
  const pageRows = visible.slice((page-1)*PAGE, page*PAGE);

  return (
    <section className="section" id="trace">
      <p className="section__eyebrow">§ 04 — the agent trace</p>
      <h2 className="section__title">Who did what, when.</h2>
      <div className="trace__filters">
        {filters.map(f => (
          <button key={f} className={`trace__filter${filter===f ? " trace__filter--on":""}`}
                  onClick={() => setFilter(f)}>{f.replace(/_/g," ")}</button>
        ))}
      </div>
      <div>
        {pageRows.map(e => (
          <div key={e.id} className="trace__row">
            <span className="trace__ts">{e.ts ? `${e.ts.slice(5,10)} · ${e.ts.slice(11,19)}` : "—"}</span>
            <span className="trace__agent">
              <span className="dot" style={{background: statusDotColor(e.status==="ok" ? "approved" : "pending")}} />
              {e.agent}
            </span>
            <span className="trace__detail">
              {traceDetail(e, shots)}
            </span>
            <span className="trace__cost">
              {e.cost_usd > 0 ? `$${e.cost_usd.toFixed(2)}` : "—"}
            </span>
          </div>
        ))}
      </div>
      <nav className="trace__pager" aria-label="Trace pagination">
        <button className="trace__pagebtn" disabled={page<=1} onClick={() => setPage(p => Math.max(1, p-1))}>← prev</button>
        <span className="trace__pageinfo">
          page <span className="t-num">{page}</span> / <span className="t-num">{totalPages}</span>
          <span className="trace__pagedim">· {visible.length} events</span>
        </span>
        <button className="trace__pagebtn" disabled={page>=totalPages} onClick={() => setPage(p => Math.min(totalPages, p+1))}>next →</button>
      </nav>
    </section>
  );
}

function traceDetail(e, shots) {
  const shot = e.shot_id ? shots.find(s => s.shot_id === e.shot_id) : null;
  const who = shot ? ` · ${shot.shot_id}` : "";
  const type = (e.event_type || "call").replace(/_/g, " ");
  if (e.error) return `${type}${who} — ${e.error}`;
  return `${type}${who} · ${e.latency_s}s · ${(e.input_tokens||0)}/${(e.output_tokens||0)} tok`;
}

/* --- Ledger ---------------------------------------------------------- */
function Ledger({ events, budget, shots }) {
  const byProvider = useMemo(() => {
    const agg = {};
    events.forEach(e => {
      const p = e.provider || "unknown";
      if (!agg[p]) agg[p] = { calls: 0, usd: 0, latency: 0 };
      agg[p].calls++;
      agg[p].usd += e.cost_usd || 0;
      agg[p].latency += e.latency_s || 0;
    });
    const eventRows = Object.entries(agg).map(([p, v]) => ({ provider: p, ...v }));
    const eventUsd = eventRows.reduce((sum, row) => sum + row.usd, 0);
    if (eventRows.length > 0 && eventUsd > 0) {
      return { rows: eventRows, source: "events" };
    }

    const shotAgg = {};
    asArray(shots).forEach((shot) => {
      asArray(shot.attempts).forEach((attempt) => {
        const p = attempt.provider || "unknown";
        if (!shotAgg[p]) shotAgg[p] = { calls: 0, usd: 0, latency: 0 };
        shotAgg[p].calls += 1;
        shotAgg[p].usd += Number(attempt.cost_usd || 0);
        shotAgg[p].latency += Number(attempt.latency_s || 0);
      });
    });
    return {
      rows: Object.entries(shotAgg).map(([p, v]) => ({ provider: p, ...v })),
      source: "attempts",
    };
  }, [events, shots]);

  const totalUsd = byProvider.rows.reduce((s, r) => s + r.usd, 0);
  const totalLat = byProvider.rows.reduce((s, r) => s + r.latency, 0);
  const totalCalls = byProvider.rows.reduce((s, r) => s + r.calls, 0);

  return (
    <section className="section" id="ledger">
      <p className="section__eyebrow">§ 05 — the production ledger</p>
      <h2 className="section__title">Receipts.</h2>
      <table className="ledger">
        <thead>
          <tr><th>provider</th><th>calls</th><th className="n">usd</th><th className="n">latency</th></tr>
        </thead>
        <tbody>
          {byProvider.rows.map(r => (
            <tr key={r.provider}>
              <td>{r.provider}</td>
              <td>{r.calls}</td>
              <td className="n">${r.usd.toFixed(2)}</td>
              <td className="n">{r.latency.toFixed(0)}s</td>
            </tr>
          ))}
        </tbody>
        <tfoot>
          <tr>
            <td>total</td>
            <td>{totalCalls}</td>
            <td className="n">${totalUsd.toFixed(2)}</td>
            <td className="n">{totalLat.toFixed(0)}s</td>
          </tr>

/* --- App ------------------------------------------------------------- */
function App({ manifest, events }) {
  const [activeId, setActiveId] = useState(null);
  const activeShot = activeId ? manifest.shots.find(s => s.shot_id === activeId) : null;

  // Audio crossfade: when one .part__audio starts playing, fade out and pause
  // every other one. 250ms linear volume ramp on the outgoing players. Newly
  // started audio also fades in from silence over the same window so the
  // transition is symmetric.
  useEffect(() => {
    const DURATION_MS = 250;
    const STEP_MS = 20;

    function rampVolume(el, from, to, onDone) {
      const steps = Math.max(1, Math.round(DURATION_MS / STEP_MS));
      let i = 0;
      el.volume = from;
      const id = setInterval(() => {
        i += 1;
        el.volume = Math.max(0, Math.min(1, from + (to - from) * (i / steps)));
        if (i >= steps) {
          clearInterval(id);
          el.volume = to;
          if (onDone) onDone();
        }
      }, STEP_MS);
      return id;
    }

    function handlePlay(ev) {
      const playing = ev.target;
      if (!(playing instanceof HTMLAudioElement)) return;
      if (!playing.classList.contains("part__audio")) return;
      document.querySelectorAll("audio.part__audio").forEach(other => {
        if (other === playing) return;
        if (other.paused) return;
        rampVolume(other, other.volume, 0, () => {
          other.pause();
          other.volume = 1; // reset for next play
        });
      });
      // Fade the new player in from 0 -> 1.
      rampVolume(playing, 0, 1);
    }

    document.addEventListener("play", handlePlay, true);
    return () => document.removeEventListener("play", handlePlay, true);
  }, []);

  return (
    <div className="page">
      <Masthead />
      <Hero manifest={manifest} events={events} />
      <Brief brief={manifest.brief} />
      <Pipeline />
      <Script shots={manifest.shots} />
      <ShotStrip shots={manifest.shots} activeId={activeId} onSelect={id => setActiveId(id === activeId ? null : id)} />
      {activeShot && <ShotDrawer shot={activeShot} audio={manifest.audio} />}
      <AgentTrace events={events} shots={manifest.shots} />
      <Ledger events={events} budget={manifest.budget} shots={manifest.shots} />
      <Colophon />
    </div>
  );
}

/* --- Bootstrap ------------------------------------------------------- */
async function loadJson(path) {
  const response = await fetch(path, { cache: "no-store" });
  if (!response.ok) {
    throw new Error(`Failed to load ${path} (${response.status})`);
  }
  return response.json();
}

(async function boot() {
  try {
    const [manifestRaw, eventsRaw] = await Promise.all([
      loadJson("./data/manifest.json"),
      loadJson("./data/events.json"),
    ]);
    const manifest = {
      ...manifestRaw,
      shots: asArray(manifestRaw.shots),
      brief: manifestRaw.brief || {},
      edit: manifestRaw.edit || {},
      audio: manifestRaw.audio || {},
      budget: manifestRaw.budget || {},
    };
    const events = asArray(eventsRaw).map(normalizeEvent);
    ReactDOM.createRoot(document.getElementById("root")).render(
      <App manifest={manifest} events={events} />
    );
  } catch (err) {
    ReactDOM.createRoot(document.getElementById("root")).render(
      <main className="section">
        <p className="section__eyebrow">data error</p>
        <h1 className="section__title">Unable to load film data.</h1>
        <p>{String(err && err.message ? err.message : err)}</p>
        <p style={{ color: "var(--fg-2)" }}>
          Expected files: ./data/manifest.json and ./data/events.json
        </p>
        {window.location.protocol === 'file:' && (
          <div style={{ marginTop: "var(--sp-4)", padding: "var(--sp-4)", background: "var(--ink)", border: "1px solid var(--rule-ink)" }}>
            <p style={{ color: "var(--accent)" }}><strong>Local Viewing Blocked by Browser</strong></p>
            <p style={{ marginTop: "8px", fontSize: "14px", lineHeight: "1.5" }}>
              Browsers block loading external JSON files when opening HTML directly from your hard drive (<code>file://</code>). 
              To view this site locally with the fetched data, start a simple web server in your terminal:
            </p>
            <pre style={{ marginTop: "12px", padding: "12px", background: "var(--bg-1)", border: "1px solid var(--rule-ink)", overflowX: "auto", fontFamily: "var(--f-mono)", fontSize: "12px" }}>
              <code>python3 -m http.server 8000 --directory site</code>
            </pre>
            <p style={{ marginTop: "12px", fontSize: "14px" }}>Then open <a href="http://localhost:8000" style={{ color: "inherit", textDecoration: "underline" }}>http://localhost:8000</a></p>
          </div>
        )}
      </main>
    );
  }
})();

</script>
