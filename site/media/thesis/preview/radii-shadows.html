<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii + shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px 28px}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.box{border:1px solid var(--fg-rule);padding:18px}
.k{font-family:var(--f-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-2);margin-bottom:10px}
.chip{background:var(--bg-2);padding:2px 6px;border-radius:2px;font-family:var(--f-mono);font-size:12px}
.none{font-family:var(--f-serif);font-style:italic;color:var(--fg-2);font-size:14px}
</style></head><body>
  <div class="wrap">
    <div class="box">
      <div class="k">radius</div>
      <div style="display:flex;gap:16px;align-items:center">
        <div style="width:44px;height:44px;background:#1C1A17"></div>
        <div>
          <div class="t-mono">radius-0: 0</div>
          <div class="t-mono" style="color:var(--fg-2)">default, everywhere</div>
        </div>
      </div>
      <div style="display:flex;gap:16px;align-items:center;margin-top:14px">
        <span class="chip">code</span>
        <div>
          <div class="t-mono">radius-1: 2px</div>
          <div class="t-mono" style="color:var(--fg-2)">inline code + hit targets only</div>
        </div>
      </div>
    </div>
    <div class="box">
      <div class="k">elevation</div>
      <p class="none" style="margin:0">No shadows. Ever.</p>
      <p class="t-small" style="margin-top:10px">Elevation is achieved by whitespace and rule weight. No blur, no glassmorphism, no glow.</p>
    </div>
  </div>
</body></html>
