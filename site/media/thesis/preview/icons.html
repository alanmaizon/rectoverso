<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 26px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.c{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 4px;border:1px solid var(--fg-rule)}
.c svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.n{font-family:var(--f-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-2)}
</style></head><body>
  <div class="t-eyebrow" style="margin-bottom:10px">lucide · 1.5 stroke · 20px · currentColor</div>
  <div class="grid">
    <div class="c"><svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg><span class="n">play</span></div>
    <div class="c"><svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span class="n">pause</span></div>
    <div class="c"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span class="n">download</span></div>
    <div class="c"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span class="n">external</span></div>
    <div class="c"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg><span class="n">expand</span></div>
    <div class="c"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg><span class="n">collapse</span></div>
  </div>
</body></html>
