<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Gragio — brand serif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px}
  .row{display:grid;grid-template-columns:64px 1fr;gap:18px;align-items:baseline;padding:10px 0;border-top:1px solid var(--fg-rule)}
  .row:first-of-type{border-top:0}
  .k{font-family:var(--f-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3)}
  .v{font-family:var(--f-serif);color:var(--fg-1);line-height:1.08}
  .alpha{font-family:var(--f-serif);font-size:28px;line-height:1.15;letter-spacing:-.01em;margin-top:6px;color:var(--fg-1)}
  .it{font-style:italic}
</style></head><body>
  <div class="t-eyebrow" style="margin-bottom:10px">gragio · brand serif · .otf + .ttf provided</div>
  <div class="row"><span class="k">88</span><span class="v" style="font-size:64px;font-style:italic">Recto Verso</span></div>
  <div class="row"><span class="k">36</span><span class="v" style="font-size:36px">Brief on one side, film on the other.</span></div>
  <div class="row"><span class="k">18</span><span class="v" style="font-size:18px;line-height:1.5">The door should feel ordinary, not magical. It is just there.</span></div>
  <div class="alpha">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br/>abcdefghijklmnopqrstuvwxyz<br/><span class="it">&amp; 0123456789 — “quotes” · $3.20</span></div>
</body></html>
