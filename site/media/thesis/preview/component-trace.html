<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Trace event</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px}
.ev{display:grid;grid-template-columns:96px 140px 1fr 80px;gap:16px;padding:10px 0;border-top:1px solid var(--fg-rule);font-family:var(--f-mono);font-size:12px;align-items:baseline}
.ts{color:var(--fg-3);font-size:11px}
.agent{color:var(--fg-1);font-weight:500}
.det{font-family:var(--f-serif);font-size:14px;color:var(--fg-2);font-style:italic}
.cost{text-align:right;font-variant-numeric:tabular-nums slashed-zero;color:var(--fg-2)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:1px}
</style></head><body>
  <div class="t-eyebrow" style="margin-bottom:6px">agent trace · one event per row</div>
  <div class="ev"><span class="ts">09:14:00</span><span class="agent"><span class="dot" style="background:#6A6354"></span>router</span><span class="det">chose vertex_veo_3_1_fast for sh_005 (hero, no humans)</span><span class="cost">—</span></div>
  <div class="ev"><span class="ts">09:19:32</span><span class="agent"><span class="dot" style="background:#4A6B3A"></span>shot_judge</span><span class="det">approved sh_005 at score 0.94</span><span class="cost">$3.20</span></div>
  <div class="ev"><span class="ts">13:08:00</span><span class="agent"><span class="dot" style="background:#8A3A2A"></span>shot_judge</span><span class="det">rejected sh_007 a1 — figure floats above ice</span><span class="cost">$0.63</span></div>
  <div class="ev"><span class="ts">13:17:00</span><span class="agent"><span class="dot" style="background:#9A6A24"></span>creative_director</span><span class="det">accept a2 and crop wider in edit</span><span class="cost">—</span></div>
</body></html>
