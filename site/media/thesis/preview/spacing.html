<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px 28px;}
.row{display:flex;align-items:center;gap:18px;padding:6px 0;}
.bar{background:#1C1A17;height:12px}
.k{font-family:var(--f-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-2);width:60px}
.v{font-family:var(--f-mono);font-size:12px;color:var(--fg-1);width:48px;text-align:right}
</style></head><body>
  <div class="t-eyebrow" style="margin-bottom:10px">spacing · 8px base</div>
  <div class="row"><span class="k">sp-0</span><span class="bar" style="width:4px"></span><span class="v">4</span></div>
  <div class="row"><span class="k">sp-1</span><span class="bar" style="width:8px"></span><span class="v">8</span></div>
  <div class="row"><span class="k">sp-2</span><span class="bar" style="width:16px"></span><span class="v">16</span></div>
  <div class="row"><span class="k">sp-3</span><span class="bar" style="width:24px"></span><span class="v">24</span></div>
  <div class="row"><span class="k">sp-4</span><span class="bar" style="width:32px"></span><span class="v">32</span></div>
  <div class="row"><span class="k">sp-5</span><span class="bar" style="width:48px"></span><span class="v">48</span></div>
  <div class="row"><span class="k">sp-6</span><span class="bar" style="width:64px"></span><span class="v">64</span></div>
  <div class="row"><span class="k">sp-7</span><span class="bar" style="width:96px"></span><span class="v">96</span></div>
</body></html>
